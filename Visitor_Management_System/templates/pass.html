<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Visitor Pass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #6c757d; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .pass-card { width: 90%; max-width: 380px; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .pass-header { background: #0d6efd; color: white; padding: 20px; text-align: center; }
        .visitor-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 5px solid white; margin-top: -65px; background: #eee; }
        .qr-img { width: 160px; height: 160px; }
        @media print { .no-print { display: none; } body { background: white; } .pass-card { box-shadow: none; width: 100%; } }
    </style>
</head>
<body>
    <div class="pass-card">
        <div class="pass-header">
            <h5 class="mb-0">VISITOR PASS</h5>
            <small>ID: VP-2026-{{ visitor.id }}</small>
        </div>
        <div class="text-center">
            <img src="{{ visitor.photo_data if visitor.photo_data else 'https://via.placeholder.com/150' }}" class="visitor-img shadow-sm">
            <h3 class="mt-3 mb-1">{{ visitor.name }}</h3>
            <p class="text-muted mb-3 px-3">Meeting with: <strong>{{ visitor.whom_to_meet }}</strong></p>
            
            <div class="bg-light p-3 mx-3 rounded-3 mb-3 border">
                <img src="data:image/png;base64,{{ qr_code }}" class="qr-img">
                <p class="small text-secondary mt-2 mb-0">Show this QR to security to exit</p>
            </div>
            
            <div class="p-3 d-grid gap-2 no-print">
                <button onclick="window.print()" class="btn btn-success rounded-pill shadow-sm">Print / Save PDF</button>
                <a href="/" class="btn btn-outline-primary rounded-pill">Done</a>
            </div>
        </div>
    </div>
</body>
</html>
