<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Visitor Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        .overstay { background-color: #ffeaea !important; border-left: 5px solid red; }
        #my_camera, #canvas { width: 100% !important; max-width: 320px; height: auto; border: 2px solid #ddd; border-radius: 12px; margin: auto; }
        .btn-lg-custom { padding: 15px; font-weight: bold; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body class="bg-light">
<div class="container py-3">
    <div class="row g-2 mb-3">
        <div class="col-6"><div class="card p-3 bg-primary text-white text-center shadow-sm"><h6>In</h6><h3>{{ current }}</h3></div></div>
        <div class="col-6"><div class="card p-3 bg-success text-white text-center shadow-sm"><h6>Total</h6><h3>{{ total }}</h3></div></div>
    </div>

    <div class="card p-3 shadow-sm mb-3">
        <form action="/register" method="POST">
            <div class="row text-center">
                <div class="col-12 mb-3">
                    <div id="my_camera" class="mx-auto"></div>
                    <button type="button" class="btn btn-dark btn-sm mt-2" onclick="take_snapshot()">Capture Identity</button>
                    <input type="hidden" name="photo_data" id="photo_data">
                </div>
                <div class="col-12 text-start px-3">
                    <input type="text" name="name" class="form-control mb-2" placeholder="Full Name" required>
                    <input type="tel" name="phone" class="form-control mb-2" placeholder="Phone Number" required>
                    <input type="text" name="whom" class="form-control mb-3" placeholder="Whom to Meet" required>
                    <button type="submit" class="btn btn-primary btn-lg-custom w-100 shadow">Generate Digital Pass</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card p-3 bg-dark text-white text-center shadow-sm mb-3">
        <h6 class="mb-2">Scan Pass to Exit</h6>
        <canvas id="canvas" hidden class="mx-auto mb-2"></canvas>
        <button id="scanBtn" class="btn btn-outline-light w-100" onclick="startScanner()">Open QR Scanner</button>
    </div>

    <div class="card p-3 shadow-sm mb-3">
        <canvas id="trafficChart" height="150"></canvas>
    </div>

    <div class="card p-2 shadow-sm">
        <div class="d-flex justify-content-between p-2">
            <h6>Active Visitors</h6>
            <a href="/logs" class="small">View All Logs</a>
        </div>
        <div class="table-responsive">
            <table class="table align-middle m-0" style="font-size: 0.9rem;">
                <tbody>
                    {% for v in visitors %}
                    <tr class="{% if v.id in overstays %}overstay{% endif %}">
                        <td><img src="{{ v.photo_data }}" style="width:40px;height:40px;border-radius:50%"></td>
                        <td>{{ v.name }}</td>
                        <td>{{ v.entry_time.strftime('%I:%M %p') }}</td>
                        <td><a href="/checkout/{{ v.id }}" class="btn btn-sm btn-danger">Exit</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/webcamjs/1.0.26/webcam.min.js"></script>
<script>
    // Webcam Setup for Mobile (Selfie)
    Webcam.set({ width: 320, height: 240, image_format: 'jpeg', jpeg_quality: 90, constraints: { facingMode: 'user' } });
    Webcam.attach('#my_camera');
    function take_snapshot() { Webcam.snap(uri => { document.getElementById('photo_data').value = uri; alert("Identity Captured!"); }); }

    // Chart
    new Chart(document.getElementById('trafficChart'), { type: 'line', data: { labels: ['Morning', 'Noon', 'Eve'], datasets: [{ label: 'Traffic', data: [12, 19, 8], borderColor: '#0d6efd', fill: true, backgroundColor: 'rgba(13, 110, 253, 0.1)' }] } });

    // QR Scanner Setup for Mobile (Back Camera)
    var video = document.createElement("video");
    var canvasElement = document.getElementById("canvas");
    var canvas = canvasElement.getContext("2d");
    function startScanner() {
        document.getElementById('scanBtn').style.display = 'none';
        canvasElement.hidden = false;
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            video.srcObject = stream; video.setAttribute("playsinline", true); video.play(); requestAnimationFrame(tick);
        });
    }
    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvasElement.height = 240; canvasElement.width = 320;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            var code = jsQR(canvas.getImageData(0, 0, canvasElement.width, canvasElement.height).data, canvasElement.width, canvasElement.height);
            if (code && code.data.startsWith("EXIT_ID_")) {
                window.location.href = "/checkout/" + code.data.split("_")[2];
                return;
            }
        }
        requestAnimationFrame(tick);
    }
</script>
</body>
</html>
