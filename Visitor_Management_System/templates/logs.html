<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visit History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .table-responsive { border-radius: 15px; }
        .search-box { border-radius: 25px; padding-left: 20px; }
    </style>
</head>
<body class="bg-light p-3">
    <div class="container card shadow-sm border-0 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0">History Logs</h4>
            <a href="/" class="btn btn-sm btn-outline-dark">Back</a>
        </div>

        <div class="row g-2 mb-4">
            <div class="col-8">
                <form action="/logs" method="GET" class="d-flex">
                    <input type="text" name="search" class="form-control search-box shadow-sm" placeholder="Search name...">
                </form>
            </div>
            <div class="col-4">
                <a href="/export" class="btn btn-success w-100 shadow-sm border-0 rounded-pill">Excel</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Visitor</th>
                        <th>Host</th>
                        <th>In Time</th>
                        <th>Out</th>
                    </tr>
                </thead>
                <tbody>
                    {% for v in visits %}
                    <tr>
                        <td>
                            <div class="d-flex align-items-center">
                                <img src="{{ v.photo_data }}" style="width:35px;height:35px;border-radius:50%; margin-right:10px;">
                                <div><small class="fw-bold">{{ v.name }}</small></div>
                            </div>
                        </td>
                        <td><small>{{ v.whom_to_meet }}</small></td>
                        <td><small>{{ v.entry_time.strftime('%I:%M %p') }}</small></td>
                        <td>
                            {% if v.status == 'OUT' %}
                                <span class="badge bg-secondary">Out</span>
                            {% else %}
                                <span class="badge bg-warning text-dark">In</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
